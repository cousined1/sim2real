  <header class="site-header">

  <main>
    <section class="section">
      <div class="container">
        <div class="form-card" style="max-width:480px">
          <h1 style="font-size:2rem;margin-bottom:12px">Set a new password</h1>
          <p class="subtitle">Paste the reset token you received and choose a new password for your Sim2Real account.</p>
          <form data-handler="reset-password">
            <div class="form-group">
              <label for="reset-token">Reset token</label>
              <input id="reset-token" name="token" type="text" required>
            </div>
            <div class="form-group">
              <label for="reset-password-new">New password</label>
              <input id="reset-password-new" name="password" type="password" required>
            </div>
            <button type="submit" class="btn btn--primary">Update password</button>
          </form>
          <div class="form-footer"><a href="login.html">Back to login</a></div>
        </div>
      </div>
    </section>
  </main>
